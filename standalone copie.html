  <style>
/* inlined from styles.css (extracted from standalone.html) */
body{ font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; margin:0; padding:20px }
header{ background:#0b6; color:#fff; padding:12px 16px }
main{ padding:16px }

.columns{ display:flex; gap:24px; align-items:flex-start }
.column{ flex:1; min-width:260px }

.players-table{ width:100%; border-collapse:collapse; margin-top:8px }
.players-table th, .players-table td{ border:1px solid #ddd; padding:8px; text-align:left }
.players-table tbody tr{ cursor:pointer }
.players-table tbody tr:hover{ background:#f6f6f6 }

#addPlayerInput{ width:100%; padding:8px; box-sizing:border-box }

@media(max-width:700px){ .columns{ flex-direction:column } }

/* Top fixed menu */
.topbar{ position:fixed; top:0; left:0; right:0; height:44px; background:#fff; border-bottom:1px solid #eee; display:flex; align-items:center; z-index:50 }
.topbar-inner{ max-width:1100px; margin:0 auto; width:100%; padding:0 16px; display:flex; align-items:center; justify-content:space-between; gap:12px }
.topbar-left{ display:flex; gap:8px; align-items:center }
.topbar-center{ display:flex; gap:12px; align-items:center }
.topbar-right{ display:flex; gap:8px; align-items:center }
.topbar button{ background:#e74c3c; color:#fff; border:none; padding:6px 10px; border-radius:6px; cursor:pointer }

/* push main content below header + topbar */
header{ position:relative; z-index:40 }
main{ padding:76px 16px 16px }

.game-actions{ margin:8px 0 }
.active-game{ margin-top:18px }
.hidden{ display:none !important }

/* Tabs */
.tabs{ display:flex; gap:8px; margin:8px 0; position:fixed; left:0; right:0; top:44px; background:#fff; padding:8px 16px; border-bottom:1px solid #eee; z-index:60 }
.tab{ background:transparent; border:1px solid #ddd; padding:6px 10px; border-radius:6px; cursor:pointer }
.tab.active{ background:#2b7cff; color:#fff; border-color:#2b7cff }
.tabs + #listsTab{ padding-top:64px }
.board-actions{ margin:8px 0 16px }

/* subtotal rows after each round */
.subtotal-row td{ font-weight:700; background:rgba(59,130,246,0.06); color:#0b5fff }
.subtotal-row td:first-child{ font-style:italic; color:#0b5fff; text-align:right; padding-right:12px }
.subtotal-cell{ text-align:right; color:#0b5fff }

/* footer totals: larger and bold for emphasis */
#boardTfoot .player-total{ font-weight:800; font-size:16px; color:#cfe0ff }
#boardTfoot td:first-child{ font-weight:700; font-size:15px; color:#cfe0ff; text-align:left }

/* ensure right alignment overrides table defaults */
.players-table td.subtotal-cell { text-align: right; color: #0b5fff }
.players-table tr.subtotal-row td:first-child { text-align: right; padding-right: 12px; color: #0b5fff }

/* make board columns narrower and inputs smaller */
#activeGameTableBoard { table-layout: fixed }
#activeGameTableBoard { table-layout: fixed; width: auto; max-width: 100%; }

/* allow horizontal scroll when table wider than container */
.active-game { overflow-x: auto }

/* force cells to respect fixed layout and hide overflow */
#activeGameTableBoard th, #activeGameTableBoard td { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; box-sizing: border-box }

/* Modal */
.modal { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.35); z-index: 200 }
.modal.hidden { display: none }
.modal-content { background: #fff; padding: 18px; border-radius: 8px; width: 360px; box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2) }
.modal-content h3 { margin: 0 0 8px 0 }
.modal-content p { margin: 0 0 12px 0; color: #333 }
.modal-actions { display: flex; gap: 8px; justify-content: space-between }
.modal-actions .btn { flex: 1; padding: 8px 10px; border-radius: 6px; border: 1px solid #ccc; background: #f7f7f7 }
/* first column (names) */
#activeGameTableBoard th:first-child, #activeGameTableBoard td:first-child { width: 150px; min-width:150px; max-width:150px; padding:4px; text-align:center }

/* Center header row (player names) in the active game table */
#activeGameTableBoard thead th { text-align: center }

/* Timer (sablier) styles */
.timer-container{ display:flex; gap:8px; align-items:center; margin:8px 0 }
.timer-container .timer-label{ font-size:12px; color:#333 }
.timer-container input[type="number"]{ width:64px; padding:6px; border-radius:6px; border:1px solid #ddd }
.timer-display{ display:flex; gap:8px; align-items:center; padding:6px 8px; background:#f3f6ff; border-radius:8px }
.hourglass{ transition: transform 0.2s linear }
.hourglass.running{ animation: hg-rotate 1s linear infinite }
@keyframes hg-rotate{ from{ transform: rotate(0deg) } to{ transform: rotate(360deg) } }
.timer-display #timerText{ font-weight:700; color:#0b5fff }

/* Word checker */
.wordcheck-container{ display:flex; gap:8px; align-items:center }
.wordcheck-container input{ width:80px; padding:6px; border-radius:6px; border:1px solid rgba(0,0,0,0.08); background:transparent; color:inherit }
.wordcheck-result-valid{ color:#7efc8d }
.wordcheck-result-invalid{ color:#ffb4b4 }
.wordcheck-result-unknown{ color:#ffd77a }

/* Ensure the word-check input keeps a fixed width despite global input[type=text] rules */
#wordCheckInput{ width:80px; flex:0 0 80px; min-width:80px; max-width:80px; box-sizing:border-box }
.wordcheck-container .btn{ flex:0 0 auto }

/* Increase wordcheck result size */
#wordCheckResult .small{ font-size:16px; font-weight:700 }
#wordCheckResult{ display:block; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

/* Board-only fixed wordcheck area (visible when onglet "Tableau" actif) */
#boardWordcheck{ position:fixed; top:64px; left:0; right:0; display:none; align-items:center; gap:8px; padding:8px 16px; z-index:55; background:linear-gradient(90deg, rgba(7,27,63,0.95), rgba(18,88,239,0.95)); }
#boardWordcheck.active{ display:flex }

/* ODS status badge spacing (moved from inline style) */
#odsStatus{ margin-left:8px }

/* Responsive: move timer under board actions on small screens */
@media(max-width:700px){ .timer-container{ flex-wrap:wrap } }

/* score columns: double width (except first column) */
#dth:nth-child(n+2),
#activeGameTableBoard td:nth-child(n+2) { width: 80px; min-width:80px; max-width:80px; padding:2px 4px }
.board-score{ width:100%; padding:2px; box-sizing:border-box; text-align:right }

/* reduce default cell padding to shrink columns slightly */
.players-table th, .players-table td{ padding:6px }

/* reduce first column (names) width and truncate long names */
#activeGameTableBoard th:first-child,
#activeGameTableBoard td:first-child,
#generalTable th:first-child,
#generalTable td:first-child,
#gameTable th:first-child,
#gameTable td:first-child {
  width: 100px;
  max-width: 100px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  text-align: center;
}

<script>
// Standalone app (no Electron/Capacitor). Uses localStorage only.
const STORAGE_KEY = 'scorekeeper_history_v1'
const LISTS_KEY = 'scorekeeper_lists_v1'
const BOARD_KEY = 'scorekeeper_board_v1'
const $ = id => document.getElementById(id)
let state = { available: [], game: [], history: [], board: { rounds: [], players: [] }, timer: { duration: 60, remaining: 60, running: false } }
// ODS wordlist set (loaded from ods8.txt if present)
let odsSet = null
let odsAvailable = false

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

async function init(){
  // attempt to load local ODS file (non-blocking if missing)
  await loadODS()
  updateODSStatus()
  bind()
  loadLists()
  loadHistory()
  loadBoard()
  renderAll()
  renderHistory()
}

async function loadODS(){
  odsSet = null
  odsAvailable = false
  try{
    const r = await fetch('ods8.txt')
    if(r && r.ok){
      const txt = await r.text()
      const lines = txt.split(/\r?\n/)
      odsSet = new Set()
      for(const l of lines){ const w = (l||'').trim(); if(!w) continue; odsSet.add(w.toUpperCase()) }
      if(odsSet.size) odsAvailable = true
      return
    }
  }catch(e){}
  // fallback to embedded seed element
  try{
    const seed = document.getElementById('seed-ods')
    if(seed){
      const words = (seed.textContent || '').split(/\r?\n/).map(s=>s.trim()).filter(Boolean)
      if(words.length){ odsSet = new Set(words.map(w=>w.toUpperCase())); odsAvailable = true; return }
    }
  }catch(e){}
  odsSet = null
  odsAvailable = false
}

function updateODSStatus(){
  const el = document.getElementById('odsStatus')
  if(!el) return
  // Ne pas afficher le statut ODS dans l'UI
  el.textContent = ''
}

function bind(){
  $('tabListsBtn').addEventListener('click', ()=>showTab('lists'))
  $('tabBoardBtn').addEventListener('click', ()=>showTab('board'))
  $('addPlayerInput').addEventListener('keydown', e=>{ if(e.key==='Enter'){ const v=(e.target.value||'').trim(); if(v){ addAvailable(v); e.target.value=''} } })
  $('generalTbody').addEventListener('click', e=>{ const tr=e.target.closest('tr'); if(!tr) return; moveToGame(tr.dataset.id) })
  $('gameTbody').addEventListener('click', e=>{ const tr=e.target.closest('tr'); if(!tr) return; moveToAvailable(tr.dataset.id) })
  $('startGameBtn').addEventListener('click', ()=>startGame())
  $('endGameBtn').addEventListener('click', ()=>endGame())
  const _nextRoundBtn = $('nextRoundBtn')
  if(_nextRoundBtn) _nextRoundBtn.addEventListener('click', ()=>nextRound())
  const _resetScoresBtn = $('resetScoresBtn')
  if(_resetScoresBtn) _resetScoresBtn.addEventListener('click', ()=>resetBoard())
  // timer hooks
  const _timerStart = $('timerStartBtn')
  const _timerStop = $('timerStopBtn')
  const _timerDuration = $('timerDuration')
  if(_timerStart){ _timerStart.addEventListener('click', ()=>{ const v = Number((_timerDuration && _timerDuration.value) || 0); if(!v || v <= 0) return alert('Durée invalide'); startTimer(v) }) }
  if(_timerStop){ _timerStop.addEventListener('click', ()=> stopTimer()) }
  // word checker hooks
  const _wordCheckBtn = $('wordCheckBtn')
  const _wordCheckInput = $('wordCheckInput')
  if(_wordCheckBtn){ _wordCheckBtn.addEventListener('click', ()=>{ const w = (_wordCheckInput && _wordCheckInput.value||'').trim(); if(!w) return alert('Entrez un mot'); checkWord(w).then(r=> showWordResult(r,w)) }) }
  if(_wordCheckInput){ _wordCheckInput.addEventListener('keydown', e=>{ if(e.key==='Enter'){ _wordCheckBtn && _wordCheckBtn.click() } }) }
  try{
    $('modalSave').addEventListener('click', ()=>{ try{ doEndGameSave() }catch(e){ console.error('save error',e) } finally{ hideModal() } })
    $('modalResume').addEventListener('click', ()=>{ hideModal() })
    $('modalReset').addEventListener('click', ()=>{ try{ state.board={rounds:[],players:[]} ; persistBoard(); renderBoard(); showTab('lists') }catch(e){ console.error('reset error', e) } finally{ hideModal() } })
    // quit button: try to close window, fallback to goodbye screen
    const modalQuit = document.createElement('button')
    modalQuit.id = 'modalQuit'
    modalQuit.type = 'button'
    modalQuit.className = 'btn ghost'
    modalQuit.textContent = 'Quitter'
    const parent = $('modalSave').parentNode
    parent.appendChild(modalQuit)
    modalQuit.addEventListener('click', ()=>{
      try{ window.close(); }catch(e){ /* fallback */ }
      try{
        document.body.innerHTML = `
          <div class="goodbye-screen">
            <div class="goodbye-inner">
              <h1>À bientôt</h1>
              <p>Tu peux fermer cet onglet.</p>
            </div>
          </div>`
      }catch(e){}
    })
  }catch(e){ console.warn('modal hooks attach failed', e) }
  // allow clicking backdrop to close modal and Esc to dismiss
  const _modal = $('endGameModal')
  if(_modal){
    _modal.addEventListener('click', (ev)=>{ if(ev.target === _modal) hideModal() })
  }
  document.addEventListener('keydown', (ev)=>{ if(ev.key === 'Escape') hideModal() })
}

function showTab(name){
  const bw = $('boardWordcheck')
  if(name === 'board'){
    $('listsTab').classList.add('hidden')
    $('boardTab').classList.remove('hidden')
    if(bw){ bw.classList.add('active'); bw.setAttribute('aria-hidden','false') }
  } else {
    $('boardTab').classList.add('hidden')
    $('listsTab').classList.remove('hidden')
    if(bw){ bw.classList.remove('active'); bw.setAttribute('aria-hidden','true') }
  }
}



function addAvailable(name){ const p={id:uid(),name}; state.available.push(p); persistLists(); renderAll() }
function moveToGame(id){ const i=state.available.findIndex(p=>p.id===id); if(i===-1) return; const [p]=state.available.splice(i,1); state.game.push(p); persistLists(); renderAll() }
function moveToAvailable(id){ const i=state.game.findIndex(p=>p.id===id); if(i===-1) return; const [p]=state.game.splice(i,1); state.available.push(p); persistLists(); renderAll() }

function renderAll(){ renderGeneral(); renderGame() }
function renderGeneral(){ $('generalTbody').innerHTML = state.available.map(p=>`<tr data-id="${p.id}"><td class="name-col">${escapeHtml(p.name)}</td></tr>`).join('') }
function renderGame(){ $('gameTbody').innerHTML = state.game.map(p=>`<tr data-id="${p.id}"><td class="name-col">${escapeHtml(p.name)}</td></tr>`).join('') }

// Board
function startGame(){ if(state.game.length===0) return alert('Sélectionner des joueurs'); state.board={ rounds:[{id:1,scores:{}}], players: state.game.map(p=>({id:p.id,name:p.name})) }; persistBoard(); renderBoard(); showTab('board') }

function renderBoard(){
  const table = $('activeGameTableBoard')
  const thead = $('boardThead')
  const tbody = $('activeGameTbodyBoard')
  const tfoot = $('boardTfoot')

  // header (player names) — ensure it's the first row in the table
  const head = ['<tr><th>Manche</th>']
  state.board.players.forEach(p => head.push(`<th class="player-col" title="${escapeHtml(p.name)}">${escapeHtml(p.name)}</th>`))
  head.push('</tr>')
  if(thead) thead.innerHTML = head.join('')
  if(table && thead && thead.parentNode !== table) table.insertBefore(thead, table.firstChild)

  // body (rounds + inputs)
  let html = ''
  state.board.rounds.forEach((rnd, ridx) => {
    html += `<tr data-round="${ridx}"><td>M${ridx+1}</td>`
    state.board.players.forEach(p => {
      const v = (rnd.scores && (p.id in rnd.scores)) ? rnd.scores[p.id] : ''
      html += `<td><input type="text" class="board-score" data-player="${p.id}" data-round="${ridx}" value="${v}"/></td>`
    })
    html += '</tr>'
    const sub = state.board.players.map(p => {
      const cum = state.board.rounds.slice(0, ridx+1).reduce((s, rr) => s + Number((rr.scores && rr.scores[p.id])||0), 0)
      return `<td class="subtotal-cell">${cum}</td>`
    })
    html += `<tr class="subtotal-row"><td>Sous-total M${ridx+1}</td>${sub.join('')}</tr>`
  })
  if(tbody) tbody.innerHTML = html

  // footer totals — ensure it's the last element in the table
  const totals = ['<tr><td>Total</td>']
  state.board.players.forEach(p => {
    const tot = state.board.rounds.reduce((s, r) => s + Number((r.scores && r.scores[p.id])||0), 0)
    totals.push(`<td class="player-total">${tot}</td>`)
  })
  totals.push('</tr>')
  if(tfoot) tfoot.innerHTML = totals.join('')
  if(table && tfoot && tfoot.parentNode !== table) table.appendChild(tfoot)

  // attach handlers
  if(tbody) tbody.querySelectorAll('.board-score').forEach(inp => { inp.addEventListener('keydown', onBoardEnter) })
}

function onBoardEnter(e){ if(e.key!=='Enter') return; e.preventDefault(); const pid = e.target.dataset.player; const ridx = Number(e.target.dataset.round); const raw = e.target.value.trim(); const val = raw===''?0:Number(raw); if(!state.board.rounds[ridx].scores) state.board.rounds[ridx].scores = {}; state.board.rounds[ridx].scores[pid]=val; persistBoard(); const players = state.board.players; const playerIdx = players.findIndex(p=>p.id===pid); const isLastPlayerInRound = playerIdx === players.length -1; const isLastRound = ridx === state.board.rounds.length -1; if(isLastPlayerInRound && isLastRound){ state.board.rounds.push({id:state.board.rounds.length+1,scores:{}}); persistBoard(); renderBoard(); const firstPlayerId = players.length?players[0].id:null; if(firstPlayerId){ const newInput = document.querySelector(`.board-score[data-round="${state.board.rounds.length-1}"][data-player="${firstPlayerId}"]`); if(newInput) newInput.focus() } } else { const nextRoundIdx = isLastPlayerInRound? (ridx+1) : ridx; const nextPlayerId = isLastPlayerInRound? players[0].id : players[playerIdx+1].id; renderBoard(); setTimeout(()=>{ const nextInput = document.querySelector(`.board-score[data-round="${nextRoundIdx}"][data-player="${nextPlayerId}"]`); if(nextInput) nextInput.focus() },0) } }

function computeRowTotals(rnd){ if(!rnd||!rnd.scores) return 0; return Object.values(rnd.scores).reduce((s,v)=>s+Number(v||0),0) }
function nextRound(){ state.board.rounds.push({id:state.board.rounds.length+1,scores:{}}); persistBoard(); renderBoard() }

function endGame(){ showModal() }
function doEndGameSave(){ const players = (state.board.players||[]).map(p=>({id:p.id,name:p.name,total: state.board.rounds.reduce((s,r)=> s + Number((r.scores && r.scores[p.id])||0), 0)})); const entry = { id: uid(), date: new Date().toISOString(), players }; try{ if(state.board && Array.isArray(state.board.rounds)) entry.board = JSON.parse(JSON.stringify(state.board)) }catch(e){} state.history.unshift(entry); persistHistory(); renderHistory(); state.board = { rounds: [], players: [] }; persistBoard(); renderBoard(); showTab('lists') }

function resetBoard(){ if(!confirm('Réinitialiser le tableau ?')) return; state.board = { rounds: [], players: [] }; persistBoard(); renderBoard(); showTab('lists') }

// persistence via localStorage only
function persistLists(){ try{ localStorage.setItem(LISTS_KEY, JSON.stringify({available:state.available,game:state.game})) }catch(e){} }
function loadLists(){ try{ const raw = localStorage.getItem(LISTS_KEY); if(raw){ const parsed = JSON.parse(raw); state.available = Array.isArray(parsed.available)?parsed.available:[]; state.game = Array.isArray(parsed.game)?parsed.game:[] } else { // seed from embedded
    const seed = document.getElementById('seed-players'); try{ const j = JSON.parse(seed.textContent); if(j && Array.isArray(j.players)){ state.available = j.players.map(n=>({id:uid(),name:n})) } }catch(e){} }
 }catch(e){ state.available=[]; state.game=[] } }

async function persistBoard(){ try{ localStorage.setItem(BOARD_KEY, JSON.stringify(state.board)) }catch(e){} }
function loadBoard(){ try{ const raw = localStorage.getItem(BOARD_KEY); if(raw){ state.board = JSON.parse(raw); return } // try seed
    const seed = document.getElementById('seed-board'); try{ const j = JSON.parse(seed.textContent); if(j && Array.isArray(j.rounds) && Array.isArray(j.players) && j.players.length>0){ state.board = j; localStorage.setItem(BOARD_KEY, JSON.stringify(j)); return } }catch(e){} state.board = { rounds: [], players: [] }
 }catch(e){ state.board = { rounds: [], players: [] } }
}

function persistHistory(){ try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.history)) }catch(e){} }
function loadHistory(){ try{ const raw = localStorage.getItem(STORAGE_KEY); state.history = raw? JSON.parse(raw) : [] }catch(e){ state.history = [] } }

function renderHistory(){ const ul = $('historyList'); ul.innerHTML = state.history.map(h=>{ const names = h.players.map(p=>p.name).join(', '); return `<li data-id="${h.id}">${new Date(h.date).toLocaleString()} — ${escapeHtml(names)} <button class="btn load">Charger</button> <button class="btn del">Suppr</button></li>` }).join(''); ul.querySelectorAll('.load').forEach(b=> b.addEventListener('click', e=>{ const id = e.target.closest('li').dataset.id; loadEntry(id) })); ul.querySelectorAll('.del').forEach(b=> b.addEventListener('click', e=>{ const id = e.target.closest('li').dataset.id; deleteEntry(id) })) }

function saveGame(){ if(state.game.length===0) return alert('Aucun joueur'); const entry = { id: uid(), date: new Date().toISOString(), players: state.game.map(p=>({id:p.id,name:p.name})) }; try{ if(state.board && Array.isArray(state.board.rounds)) entry.board = JSON.parse(JSON.stringify(state.board)) }catch(e){} state.history.unshift(entry); persistHistory(); renderHistory() }

function loadEntry(id){ const ent = state.history.find(x=>x.id===id); if(!ent) return; state.game = ent.players.map(p=>({id:p.id,name:p.name})); persistLists(); renderAll(); if(ent.board && Array.isArray(ent.board.rounds)){ state.board = ent.board; persistBoard(); renderBoard(); showTab('board') } }
function deleteEntry(id){ state.history = state.history.filter(x=>x.id!==id); persistHistory(); renderHistory() }

function showModal(){ const m=$('endGameModal'); if(m){ m.classList.remove('hidden') } }
function hideModal(){ const m=$('endGameModal'); if(m){ m.classList.add('hidden') } }

function escapeHtml(s){ return String(s).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]||c)) }

// init
init()
    
  // --- Timer functionality (ported) ---
  let __timerInterval = null
  let __audioCtx = null
  function updateTimerDisplay(){ const txt = $('timerText'); const disp = $('timerDisplay'); if(!state.timer) state.timer = { duration:60, remaining:60, running:false }; const rem = state.timer.remaining != null ? state.timer.remaining : state.timer.duration; const mm = Math.floor(rem/60); const ss = rem % 60; if(txt) txt.textContent = `${mm}:${String(ss).padStart(2,'0')}`; const hg = disp ? disp.querySelector('.hourglass') : null; if(hg){ if(state.timer.running) hg.classList.add('running'); else hg.classList.remove('running') } }
    
  function startTimer(seconds){ stopTimer(); state.timer = state.timer || {}; state.timer.duration = seconds; state.timer.remaining = seconds; state.timer.running = true; updateTimerDisplay(); try{ const AudioCtx = window.AudioContext || window.webkitAudioContext; if(AudioCtx && !__audioCtx) __audioCtx = new AudioCtx(); if(__audioCtx && __audioCtx.state === 'suspended') __audioCtx.resume() }catch(e){}
    __timerInterval = setInterval(()=>{ if(!state.timer) return; state.timer.remaining = Math.max(0, (state.timer.remaining||0) - 1); updateTimerDisplay(); try{ if(state.timer.remaining > 0 && state.timer.remaining <= 5){ playShortBeep() } if(state.timer.remaining <= 0){ stopTimer(); try{ playLongBeep() }catch(e){} } }catch(e){} }, 1000)
  }
    
  function playBeep(){ try{ const AudioCtx = window.AudioContext || window.webkitAudioContext; const ctx = __audioCtx || (AudioCtx ? new AudioCtx() : null); if(!ctx) return; if(ctx.state === 'suspended' && ctx.resume) ctx.resume(); const o = ctx.createOscillator(); const g = ctx.createGain(); o.type = 'sine'; o.frequency.value = 880; g.gain.setValueAtTime(0.0001, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.2, ctx.currentTime + 0.01); o.connect(g); g.connect(ctx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.6); setTimeout(()=>{ try{ o.stop(); if(!__audioCtx){ ctx.close() } }catch(e){} }, 700) }catch(e){} }
    
  function playShortBeep(){ try{ const ctx = __audioCtx; if(!ctx) return; if(ctx.state === 'suspended' && ctx.resume) ctx.resume(); const o = ctx.createOscillator(); const g = ctx.createGain(); o.type = 'square'; o.frequency.value = 1200; g.gain.setValueAtTime(0.0001, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.12, ctx.currentTime + 0.005); o.connect(g); g.connect(ctx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.12); setTimeout(()=>{ try{ o.stop() }catch(e){} }, 180) }catch(e){} }
    
  function playLongBeep(){ try{ const ctx = __audioCtx; if(!ctx) return; if(ctx.state === 'suspended' && ctx.resume) ctx.resume(); const o = ctx.createOscillator(); const g = ctx.createGain(); o.type = 'sine'; o.frequency.value = 392; g.gain.setValueAtTime(0.0001, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.4, ctx.currentTime + 0.02); o.connect(g); g.connect(ctx.destination); o.start(); g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 2.0); setTimeout(()=>{ try{ o.stop() }catch(e){} }, 2100) }catch(e){} }
    
  function stopTimer(){ if(__timerInterval){ clearInterval(__timerInterval); __timerInterval = null } if(state.timer) state.timer.running = false; updateTimerDisplay() }

  // --- Word checker (FFScrabble attempt + fallback) ---
 function showWordResult(res, word){
  const el = $('wordCheckResult'); if(!el) return;
  const w = escapeHtml(word || '')
  if(res && res.valid){
    el.innerHTML = `<span class="small wordcheck-result-valid">${w} est valide</span>`;
  } else if(res && res.valid === false){
    if(res.source === 'ODS8'){
      el.innerHTML = `<span class="small wordcheck-result-invalid">${w} n'est pas valide selon ODS8</span>`;
    } else {
      el.innerHTML = `<span class="small wordcheck-result-invalid">${w} n'est pas valide</span>`;
    }
  } else {
    el.innerHTML = `<span class="small wordcheck-result-unknown">Impossible de vérifier (${escapeHtml(res && res.source || 'aucun')})</span>`;
  }
}

 async function checkWord(word){
  const trimmed = (word||'').trim(); if(!trimmed) return { valid: null, source: null }
  // Si l'ODS est disponible, il est maître : présent => valide, absent => invalide
  try{
    if(odsSet){
      if(odsSet.has(trimmed.toUpperCase())){
        return { valid: true, source: 'ODS8', defs: [] }
      } else {
        return { valid: false, source: 'ODS8' }
      }
    }
  }catch(e){}
  // Pas d'ODS : impossible de vérifier localement de manière fiable
  return { valid: null, source: null }
}
